name: PHPUnit

on:
  pull_request:
    paths:
      - '**.php'
      - composer.json
      - phpunit.xml.dist
      - .github/workflows/phpunit.yml
  workflow_dispatch:

jobs:
  phpunit:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php-versions: ['8.1', '8.4']
        prefer: ['prefer-stable', 'prefer-lowest']

    name: PHPUnit with PHP ${{ matrix.php-versions }} ${{ matrix.prefer }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: bcmath, curl, fileinfo, gd, intl, mbstring, mysqli, xml, zip
          coverage: none

      - name: Set up MySQL
        run: |
          sudo systemctl start mysql.service
          until sudo mysqladmin ping --silent; do sleep 1; done
          sudo mysql -uroot -proot -e 'CREATE DATABASE civicrm;'
          sudo mysql -uroot -proot -e "CREATE USER 'user'@'localhost' IDENTIFIED BY 'password';"
          sudo mysql -uroot -proot -e "GRANT ALL PRIVILEGES ON *.* TO 'user'@'localhost';"
          sudo mysql -uroot -proot -e "GRANT SUPER ON *.* TO 'user'@'localhost';"
          sudo mysql -uroot -proot -e "SET GLOBAL log_bin_trust_function_creators = 1;"
          sudo mysql -uroot -proot -e 'FLUSH PRIVILEGES;'

      - name: Install project dependencies
        env:
          COMPOSER_COMPILE: none
        run: |
          composer config --no-plugins allow-plugins.composer/installers true
          composer config --no-plugins allow-plugins.cweagans/composer-patches true
          composer config --no-plugins allow-plugins.civicrm/composer-compile-plugin true
          composer config --no-plugins allow-plugins.civicrm/composer-downloads-plugin true
          composer update --no-interaction --prefer-dist --no-scripts --${{ matrix.prefer }}

      - name: Install CiviCRM standalone
        run: |
          cd ..
          git clone https://github.com/civicrm/civicrm-standalone.git
          cd civicrm-standalone
          
          composer config --no-plugins allow-plugins.composer/installers true
          composer config --no-plugins allow-plugins.cweagans/composer-patches true
          composer config --no-plugins allow-plugins.civicrm/composer-compile-plugin true
          composer config --no-plugins allow-plugins.civicrm/composer-downloads-plugin true
          composer config --json 'extra.installer-paths.ext/{$name}' '["type:civicrm-ext"]'
          
          composer require --no-interaction --prefer-dist composer/installers civicrm/cli-tools
          composer require composer/installers civicrm/cli-tools
          export PATH="$(pwd)/vendor/bin:$PATH"
          export CV_CONFIG="$HOME/.cv.json"
          
          cv core:install --db='mysql://user:password@127.0.0.1:3306/civicrm?new_link=true'
          cv vars:fill --quiet
          sed -i 's#"TEST_DB_DSN": ".*"#"TEST_DB_DSN": "mysql://user:password@127.0.0.1:3306/civicrm?new_link=true"#g' "$CV_CONFIG"
          
          grep TEST_DB_DSN "$CV_CONFIG"

      - name: Install required extensions
        run: |
          cd ../civicrm-standalone
          export PATH="$(pwd)/vendor/bin:$PATH"
          
          cv ext:download "org.project60.sepa@https://github.com/Project60/org.project60.sepa/releases/download/1.12.3/org.project60.sepa-1.12.3.zip"

      - name: Place project into standalone ext dir
        run: |
          mkdir -p ../civicrm-standalone/ext
          cp -R . ../civicrm-standalone/ext/civicrm-test-fixtures
          rm -rf ../civicrm-standalone/ext/civicrm-test-fixtures/vendor

      - name: Run PHPUnit
        run: |
          export PATH="$(realpath ../civicrm-standalone/vendor/bin):$PATH"
          export CV_CONFIG="$HOME/.cv.json"
          ROOT_DIR="$(pwd)"
          cd ../civicrm-standalone/ext/civicrm-test-fixtures
          "$ROOT_DIR/vendor/bin/phpunit"
